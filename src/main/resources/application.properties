spring.application.name=Noyon

# ??? Database ???????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/noyon_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# ??? JPA ?????????????????????????????????????????????????????????????????????
# WARNING: change to 'validate' or 'none' in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ??? JWT ?????????????????????????????????????????????????????????????????????
# Generate a strong random secret: `openssl rand -base64 64`
# In production, set this via environment variable
noyon.jwt.secret=${JWT_SECRET:your-very-strong-secret-key-at-least-512-bits-long-change-this-now}
noyon.jwt.access-token-expiration-ms=900000
noyon.jwt.refresh-token-expiration-ms=604800000

# ??? Server ??????????????????????????????????????????????????????????????????
server.port=8080